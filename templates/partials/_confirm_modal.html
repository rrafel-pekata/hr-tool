{% load i18n %}
<!-- Reusable confirmation modal (Alpine.js) -->
<div x-data="{ show: false, title: '', message: '', form: null }"
     @confirm-delete.window="show = true; title = $event.detail.title; message = $event.detail.message; form = $event.detail.form"
     @keydown.escape.window="show = false"
     x-show="show"
     x-cloak
     class="relative z-50">

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-gray-500/75 transition-opacity"
         x-show="show"
         x-transition:enter="ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="show = false"></div>

    <!-- Modal -->
    <div class="fixed inset-0 z-50 overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">
            <div x-show="show"
                 x-transition:enter="ease-out duration-200"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-150"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 class="relative w-full max-w-md rounded-xl bg-white shadow-2xl"
                 @click.outside="show = false">

                <!-- Body -->
                <div class="px-6 py-6 text-center">
                    <!-- Warning icon -->
                    <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-100">
                        <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900" x-text="title"></h3>
                    <p class="mt-2 text-sm text-gray-500" x-text="message"></p>
                </div>

                <!-- Footer -->
                <div class="flex items-center justify-end gap-3 border-t border-gray-200 px-6 py-4">
                    <button @click="show = false"
                            class="rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm font-medium text-gray-700 shadow-sm hover:bg-gray-50">
                        {% trans "Cancelar" %}
                    </button>
                    <button @click="show = false; form && form.submit()"
                            class="rounded-md bg-red-600 px-3 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-red-500">
                        {% trans "Eliminar" %}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
