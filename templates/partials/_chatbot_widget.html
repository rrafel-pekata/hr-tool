<div id="chatbot-widget" x-data="chatbotWidget" data-tour-page="{% block tour_page %}{% endblock %}" @click.away="open = false">
    <!-- CSRF token -->
    <div id="chatbot-csrf" style="display:none">{% csrf_token %}</div>

    <!-- Panel -->
    <div class="chatbot-panel" x-show="open" x-cloak x-transition>
        <!-- Header -->
        <div class="chatbot-header">
            <span>Pekata Assistant</span>
            <div class="chatbot-header-actions">
                <!-- Tour button -->
                <button @click="startTour()" title="Ver tour de esta página">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </button>
                <!-- Clear chat -->
                <button @click="clear()" title="Limpiar chat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
                <!-- Close -->
                <button @click="open = false" title="Cerrar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="chatbot-messages">
            <!-- Welcome message (shown when no messages) -->
            <template x-if="messages.length === 0 && !loading">
                <div class="chatbot-welcome">
                    <p><strong>Hola, soy Pekata Assistant</strong></p>
                    <p>Pregúntame sobre cómo usar la aplicación, crear posiciones, gestionar candidatos y más.</p>
                    <div class="chatbot-quick-actions">
                        <button class="chatbot-quick-btn" @click="startTour()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            Tour de esta página
                        </button>
                        <button class="chatbot-quick-btn" @click="resetTours()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                            Reiniciar tours
                        </button>
                    </div>
                </div>
            </template>

            <!-- Message list -->
            <template x-for="(msg, i) in messages" :key="i">
                <div :class="msg.role === 'user' ? 'chatbot-msg chatbot-msg-user' : 'chatbot-msg chatbot-msg-bot'">
                    <template x-if="msg.role === 'user'">
                        <span x-text="msg.content"></span>
                    </template>
                    <template x-if="msg.role === 'bot'">
                        <div x-html="msg.content"></div>
                    </template>
                </div>
            </template>

            <!-- Typing indicator -->
            <template x-if="loading">
                <div class="chatbot-typing">
                    <span></span><span></span><span></span>
                </div>
            </template>
        </div>

        <!-- Input -->
        <div class="chatbot-input-area">
            <input type="text"
                   class="chatbot-input"
                   placeholder="Escribe tu pregunta..."
                   x-model="input"
                   @keydown="handleKey($event)"
                   :disabled="loading">
            <button class="chatbot-send" @click="send()" :disabled="loading || !input.trim()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/></svg>
            </button>
        </div>
    </div>

    <!-- FAB button -->
    <button class="chatbot-fab" @click="toggle()" title="Ayuda">
        <svg x-show="!open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <svg x-show="open" x-cloak xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
    </button>
</div>
